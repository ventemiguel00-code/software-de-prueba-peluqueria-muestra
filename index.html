        var cached = null;

          "--glass-soft": colors.primary + "12"
        };
        Object.keys(pairs).forEach(function (key) { root.style.setProperty(key, pairs[key]); });
        root.dataset.themeBoot = cached && cached.theme ? cached.theme : "neutral";
